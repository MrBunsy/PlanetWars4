<body>

<h1>Planet Wars</h1>

<div class="planet_wars" id="planet_wars_game">

        <canvas id="planet_wars1" width="800" height="800" ></canvas>
        <canvas id="planet_wars2" width="800" height="800" ></canvas>

</div>
